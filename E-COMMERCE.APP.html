<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced E-Commerce</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }
    .products, .cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }
    .product {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
    }
    input {
      width: 50px;
      padding: 5px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #218838;
    }
    .cart-item {
      border-bottom: 1px solid #ddd;
      padding: 5px 0;
    }
    .checkout {
      background: #007bff;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>My E-Commerce Store</h1>
</header>

<div class="container">

  <!-- Products -->
  <div class="products">
    <h2>Products</h2>

    <div class="product">
      <img src="https://via.placeholder.com/80" alt="">
      <div>
        <h3>Product 1</h3>
        <p>$10</p>
        Qty: <input type="number" id="q1" value="1" min="1">
        <button onclick="addToCart('Product 1', 10, 'q1')">Add</button>
      </div>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/80" alt="">
      <div>
        <h3>Product 2</h3>
        <p>$20</p>
        Qty: <input type="number" id="q2" value="1" min="1">
        <button onclick="addToCart('Product 2', 20, 'q2')">Add</button>
      </div>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/80" alt="">
      <div>
        <h3>Product 3</h3>
        <p>$15</p>
        Qty: <input type="number" id="q3" value="1" min="1">
        <button onclick="addToCart('Product 3', 15, 'q3')">Add</button>
      </div>
    </div>

  </div>

  <!-- Cart -->
  <div class="cart">
    <h2>Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: $<span id="total">0</span></h3>
    <button class="checkout" onclick="checkout()">Checkout</button>
  </div>

</div>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function addToCart(name, price, qtyId) {
    const qty = parseInt(document.getElementById(qtyId).value);

    const existing = cart.find(item => item.name === name);

    if (existing) {
      existing.qty += qty;
    } else {
      cart.push({ name, price, qty });
    }

    saveCart();
    displayCart();
  }

  function displayCart() {
    const cartItems = document.getElementById("cart-items");
    const totalElement = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;

      const div = document.createElement("div");
      div.classList.add("cart-item");
      div.innerHTML = `
        ${item.name} - $${item.price} x ${item.qty} = $${itemTotal}
        <button onclick="removeItem(${index})">X</button>
      `;
      cartItems.appendChild(div);
    });

    totalElement.textContent = total;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    saveCart();
    displayCart();
  }

  function checkout() {
    if (cart.length === 0) {
      alert("Cart is empty!");
    } else {
      alert("Order placed successfully!");
      cart = [];
      saveCart();
      displayCart();
    }
  }

  // Load cart on page load
  displayCart();
</script>

</body>
</html>
